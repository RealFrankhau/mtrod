<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MTR Timetable Display</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="mtr-container">

  <!-- ══ ROW 1: HEADER ══ -->
  <div class="mtr-header" id="mtrHeader">
    <div class="mtr-header-left">
      <span class="mtr-header-label" id="mtrLineLabel" onclick="openDropdown()">東涌綫</span>
      <span class="mtr-header-sep">&nbsp;·</span>
      <span class="mtr-header-label" id="mtrStaLabel" onclick="openDropdown()">青衣</span>
    </div>
    <div class="mtr-header-clock" id="mtrClock">--:--:--</div>
  </div>

  <!-- ══ ROW 2 ══ -->
  <div class="mtr-row mtr-row-2" id="mtrRow2">
    <span class="mtr-row-dest" id="dest2">—</span>
    <span class="mtr-row-platform" id="plat2" style="background:#F38B00">—</span>
    <span class="mtr-row-eta" id="eta2">—</span>
  </div>

  <!-- ══ ROW 3 ══ -->
  <div class="mtr-row mtr-row-3" id="mtrRow3">
    <span class="mtr-row-dest" id="dest3">—</span>
    <span class="mtr-row-platform" id="plat3" style="background:#F38B00">—</span>
    <span class="mtr-row-eta" id="eta3">—</span>
  </div>

  <!-- ══ THICK BLACK DIVIDER ══ -->
  <div class="mtr-divider"></div>

  <!-- ══ ROW 4 ══ -->
  <div class="mtr-row mtr-row-4" id="mtrRow4">
    <span class="mtr-row-dest" id="dest4">—</span>
    <span class="mtr-row-platform" id="plat4" style="background:#F38B00">—</span>
    <span class="mtr-row-eta" id="eta4">—</span>
  </div>

  <!-- ══ ROW 5 ══ -->
  <div class="mtr-row mtr-row-5" id="mtrRow5">
    <span class="mtr-row-dest" id="dest5">—</span>
    <span class="mtr-row-platform" id="plat5" style="background:#F38B00">—</span>
    <span class="mtr-row-eta" id="eta5">—</span>
  </div>

</div>

<!-- ══ DROPDOWN OVERLAY ══ -->
<div class="mtr-dropdown-overlay" id="mtrDropdownOverlay" onclick="closeDropdownOutside(event)">
  <div class="mtr-dropdown-panel" id="mtrDropdownPanel" onclick="event.stopPropagation()">
    <h3 id="dropdownTitle">選擇路線及車站 Select Line & Station</h3>
    <div class="mtr-line-grid" id="mtrLineGrid"></div>
    <button class="mtr-dropdown-close" onclick="closeDropdown()">關閉 Close ✕</button>
  </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
